name: CI / CD

on:
  push:
    branches: ["**"]
  pull_request:
    types: [opened, synchronize, reopened]
  pull_request_target:
    types: [closed]

permissions:
  contents: read

jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request_target'
    permissions:
      checks: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install just
        uses: extractions/setup-just@v2
        with:
          just-version: "1.40.0"

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: just typecheck

      - name: Lint
        run: just lint

      - name: Unit tests and scenario tests
        run: just test

      - name: Publish test report
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Vitest
          path: test-results/junit.xml
          reporter: jest-junit
          fail-on-error: false

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: test-results/junit.xml
          retention-days: 7

      - name: Headless smoke check
        run: just smoke

      - name: Web build (PR preview)
        if: github.event_name == 'pull_request'
        env:
          VITE_BASE_URL: /JenesBoot/pr-${{ github.event.pull_request.number }}/
        run: just build

      - name: Web build (production)
        if: github.event_name != 'pull_request'
        run: just build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 1

  deploy-preview:
    name: deploy preview
    needs: build
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Download dist
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Deploy PR preview to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: dist/
          destination_dir: pr-${{ github.event.pull_request.number }}
          keep_files: true

      - name: Comment preview URL on PR
        uses: actions/github-script@v7
        with:
          script: |
            const url = `https://pandazxx.github.io/JenesBoot/pr-${{ github.event.pull_request.number }}/`;
            const marker = '<!-- pr-preview-comment -->';
            const body = `${marker}\n🔍 **Preview:** ${url}\n\n_Updated on every push to this PR._`;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

  deploy-production:
    name: deploy production
    needs: build
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download dist
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Deploy to gh-pages root
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: dist/
          keep_files: true

  cleanup-preview:
    name: cleanup preview
    if: github.event_name == 'pull_request_target' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages

      - name: Remove PR preview directory
        run: |
          PR="${{ github.event.pull_request.number }}"
          if [ -d "pr-${PR}" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git rm -rf "pr-${PR}/"
            git commit -m "chore: remove preview for PR #${PR}"
            git push
          else
            echo "No preview directory for PR #${PR}, nothing to clean up."
          fi
